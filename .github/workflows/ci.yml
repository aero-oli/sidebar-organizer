name: CI

on:
  pull_request:
    branches:
      - main
      - dev
    paths:
      - 'src/**'
      - 'custom_components/**'
      - 'tests/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'rollup.config.js'
      - 'hacs.json'
      - '.github/workflows/**'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm run verify
